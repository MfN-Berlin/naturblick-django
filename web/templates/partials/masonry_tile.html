{% load static web_tags %}
<a id="masonry_tile_{{ id }}" href="{% url 'portrait' id %}?lang={{ lang }}">
  <img src="{{img_url}}" loading="lazy" width="{{ width }}" height="{{ height }}" style="aspect-ratio: {{ width }} / {{ height }}"/>

  <div>
    {% group_svg group %}
    <div>
      <h5>{{ name }}</h5>
      <p class="scientific">{{ sciname }}</p>
    </div>
  </div>
</a>
