{% load web_tags %}

<div class="audio">
    <div>
        {% inline_svg 'play-media.svg' %}
        <div>
            <h3>{{ audio.audio_title }}</h3>
            <p>{{ audio.licence }}</p>
        </div>
    </div>

    <img src="{{ audio.png }}">

    <audio controls>
        <source src="{{ audio.url }}">
    </audio>
</div>
