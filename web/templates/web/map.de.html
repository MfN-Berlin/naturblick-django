{% extends "web/page_base.html" %}

{% load static web_tags %}

{% block additional_header %}
<script src='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js'></script>
<link href='https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css' rel='stylesheet' />
{% endblock %}

{% block header_title %}{% endblock %}

{% block content %}
<div id='map' style='width: 100%; height: 100%'></div>
<script>
const mfn = [13.3792, 52.5295]

var map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/bright',
    center: mfn,
    zoom: 9,
    cluster: true,
});

map.on('load', () => {
    map.addSource('observations', {
        type: 'geojson',
        data: '/index/dev/map_proxy',
        cluster: true,
        clusterMaxZoom: 14,
        clusterRadius: 50
    });

    map.addLayer({
        id: 'cluster-observations',
        type: 'circle',
        source: 'observations',
        filter: ['has', 'point_count'],
        paint: {
            'circle-color': [
                'step',
                ['get', 'point_count'],
                '#3bb4e7',
                50, '#12466a',
                750, '#000000'
            ],
            'circle-radius': 20
        }
    });

    map.addLayer({
        id: 'cluster-count',
        type: 'symbol',
        source: 'observations',
        filter: ['has', 'point_count'],
        layout: {
            'text-field': '{point_count_abbreviated}',
            'text-font': ['Noto Sans Regular'],
            'text-size': 12
        },
        paint: {
            'text-color': '#ffffff'
        }
    });


    map.addLayer({
        id: 'unclustered-observations',
        type: 'circle',
        source: 'observations',
        filter: ['!', ['has', 'point_count']],
        paint: {
            'circle-color': '#3bb4e7',
            'circle-radius': 20,
            'circle-stroke-width': 1,
            'circle-stroke-color': '#fff'
        }
    });

    map.on('click', 'unclustered-observations', (e) => {
        console.log('Foo')
        const coordinates = e.features[0].geometry.coordinates.slice();
        const obs_id = e.features[0].properties.id;

        // Ensure that if the map is zoomed out such that
        // multiple copies of the feature are visible, the
        // popup appears over the copy being pointed to.
        while (Math.abs(e.lngLat.lng - coordinates[0]) > 180) {
           coordinates[0] += e.lngLat.lng > coordinates[0] ? 360 : -360;
        }

        new maplibregl.Popup()
            .setLngLat(coordinates)
            .setHTML(
                `<h1>${obs_id}</h1>`
            )
            .addTo(map);
    });
});

</script>
{% endblock %}

{% block footer %}{% endblock %}
